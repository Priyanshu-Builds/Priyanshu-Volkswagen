<!DOCTYPE html>
<html>
<head>
    <title>Unavailable Books</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Library Management System</h1>
    <nav>
        <a href="{{ url_for('index') }}">All Books</a>
        <a href="{{ url_for('add_book') }}">Add Book</a>
        <a href="{{ url_for('unavailable_books') }}">Unavailable Books</a>
    </nav>

    <h2>Unavailable Books</h2>
    {% if books %}
    <table>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Copies</th>
        </tr>
        {% for book in books %}
        <tr>
            <td>{{ book.id }}</td>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.copies }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>All books are currently available.</p>
    {% endif %}
</body>
</html>
