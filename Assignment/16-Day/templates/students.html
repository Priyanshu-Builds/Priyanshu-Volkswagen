<!DOCTYPE html>
<html>
<head>
    <title>Student Results</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            padding: 40px;
        }

        table {
            width: 60%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

        .pass {
            color: green;
            font-weight: bold;
        }

        .fail {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Student Result Table</h2>

<table>
    <tr>
        <th>Student Name</th>
        <th>Marks</th>
        <th>Result</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.name }}</td>
        <td>{{ student.marks }}</td>
        <td>
            {% if student.marks >= 50 %}
                <span class="pass">Pass</span>
            {% else %}
                <span class="fail">Fail</span>
            {% endif %}
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
