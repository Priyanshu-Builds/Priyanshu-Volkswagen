<!DOCTYPE html>
<html>

<head>
    <title>Volkswagen Group Cars</title>
    <style>
        body {
            font-family: Arial;
            padding: 30px;
            background: #f4f6f9;
        }

        table {
            width: 85%;
            margin: auto;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: #1a3d7c;
            color: white;
        }

        .available {
            color: green;
            font-weight: bold;
        }

        .not-available {
            color: red;
            font-weight: bold;
        }

        .count {
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .empty {
            text-align: center;
            color: red;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h2 style="text-align:center;">Volkswagen Group Car Listing</h2>

    <div class="count">
        Total Cars: {{ total }}
    </div>

    {% if cars %}
    <table>
        <tr>
            <th>Car Name</th>
            <th>Brand</th>
            <th>Price (₹)</th>
            <th>Availability</th>
        </tr>

        {% for car in cars %}
        <tr>
            <td>{{ car.name }}</td>
            <td>{{ car.brand }}</td>
            <td>{{ car.price }}</td>
            <td>
                {% if car.available %}
                <span class="available">Available</span>
                {% else %}
                <span class="not-available">Not Available</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <div class="empty">No cars found.</div>
    {% endif %}

</body>

</html>
